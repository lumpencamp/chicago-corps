# Re-verification GitHub Action
# Runs weekly to flag stale entries and check website health

name: Verify Directory

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:       # Manual trigger

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run verification checks
        run: |
          python .github/scripts/verify_groups.py

      - name: Upload staleness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: _reports/stale_report.json
          retention-days: 30
