title: Chicago Corps
description: A verified directory of mutual aid and community support groups in the Chicago area. Built to match volunteers with organizations that need them.
baseurl: "/chicago-corps"
url: "https://lumpencamp.github.io"

# Build settings
markdown: kramdown
plugins: []

# Exclude from build
exclude:
  - build.py
  - "*.pdf"
  - node_modules/
  - vendor/
  - Gemfile
  - Gemfile.lock
  - Makefile
  - README.md
  - OPERATIONAL_PLAN.md
  - schema.md
  - taxonomy.md
  - sources/
  - coverage/

# Collections
collections:
  groups:
    output: true
    permalink: /groups/:slug/

defaults:
  - scope:
      path: ""
    values:
      layout: default
